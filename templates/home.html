<!DOCTYPE html>
<html>
    <head>
        <title>Crud Opeartion</title>
    </head>
    <body>
        <h1>User Mangement System using Flask & MySQL</h1>
        <p>
            <a href="{{url_for('add_user')}}">Add User</a>
        </p>
        <table border="1">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
            {% for data in datas%}
            <tr>
                <td>{{data.ID}}</td>
                <td>{{data.Name}}</td>
                <td>{{data.Age}}</td>
                <td>{{data.City}}</td>
            </tr>
            {% endfor %}
        </table>
    </body>
</html>
